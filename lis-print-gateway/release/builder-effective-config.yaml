directories:
  output: release
  buildResources: build
appId: com.medilis.printgateway
productName: LIS Print Gateway
files:
  - filter:
      - dist/**/*
      - src/index.html
      - node_modules/**/*
win:
  target: nsis
  icon: assets/icon.ico
  forceCodeSigning: false
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  runAfterFinish: true
asarUnpack:
  - '**/node_modules/pdf-to-printer/dist/SumatraPDF-3.4.6-32.exe'
electronVersion: 40.8.0
