<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zebra Label Design Preview</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, #f8fafc, #e2e8f0 60%, #cbd5e1 100%);
        font-family: Tahoma, Arial, sans-serif;
      }

      .frame {
        background: rgba(255, 255, 255, 0.8);
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 18px;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.18);
        padding: 24px;
      }

      svg {
        display: block;
        width: 1000px;
        height: 500px;
        background: #fff;
      }

      text {
        fill: #000;
      }
    </style>
  </head>
